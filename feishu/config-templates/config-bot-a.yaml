# ============================================================
# Bot A（主协调人）配置模板
# ============================================================
# 使用方式：HERMES_HOME=~/.hermes-bot-a hermes gateway start

feishu:
  allow_bots: mentions       # 接受 @ 自己的其他 Bot 消息
  require_mention: true       # 群聊中需要 @ 才响应
  group_policy: open          # open | allowlist | disabled

gateway:
  enabled: true

# ⚠️ 以下 a2a.* 字段不是 Hermes 原生配置，仅供 hermes-a2a skill 读取。
# skill 会根据这些值自动注入协作角色和 peer 信息到系统提示词中。
# 如果不使用 skill，可以删除此段，改为手动在系统提示词中写明角色。
a2a:
  role: leader                # leader | executor
  name: "Bot A"                # Bot 显示名
  peers:                      # 对端 Bot 列表
    - name: "Bot B"
      open_id: "ou_yyyyyyyyyyyyyyyyyyyyyyyy"

# 可选：显示设置
display:
  skin: default
